<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My To-Do App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" href="/tasks/">My To-Do List</a>
  </nav>

  <div class="container mt-4">
  {% block start %}
<div class="container mt-5">
<form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data",Action="{% url 'todocheck' %}">
  {% csrf_token %}
  <h2>Add your task here</h2>
  <div class="mb-3">
    <label >Title:</label>
    <input type="text" class="form-control" value="{{tasks.title1}}" name="title1">
  </div>
  <div class="mb-3">
    <label >Description</label>
    <input type="text" class="form-control"  value="{{tasks.desc}}" name="desc" >
  </div>
  <div class="mb-3">
    <label >Due date</label>
    <input type="date" class="form-control"  value="{{tasks.due_date}}" name="due_date">
  </div>
  <button type="submit" class="btn btn-primary">Update</button>
</form>
</div>

{% endblock %}
</div>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
