{% extends 'home/base.html' %}
{% block start %}

<div class="container mt-5">
<form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Add Recipe</h2>
        <hr>
    <div class="mb-3 shadow-sm">
        <label>Recipe name: </label>
        <input type="text" value="{{recipe.recipe_name}}" class="form-control" name="recipe_name">
    </div>

    <div class="mb-3 shadow-sm">
        <label>Recipe Description: </label>
        <textarea class="form-control" value="" name="recipe_desc" >{{recipe.recipe_desc}}</textarea>
    </div>

    <div class="mb-3 shadow-sm">
        <label>Recipe Image</label>
        <input type="file" class="form-control" name="recipe_img" value="{{recipe.recipe_img}}">
    </div>

    {% comment %} <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
    </div>
    
    {% endcomment %}
    <button type="submit" class="btn btn-success">Click to Update recipe</button>
</form>

</div>
{% endblock  %}
